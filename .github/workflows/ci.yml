name: CI Kloop

on:
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    
    # Injetando as variáveis de ambiente necessárias para o build do Next.js
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      
      # Descomente as linhas abaixo se o build começar a pedir essas variáveis também.
      # Lembre-se de adicioná-las na aba "Secrets and variables" > "Actions" no GitHub.
      # AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      # AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
      # AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
      # NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      # RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Build do Next.js (Lint e TS Check)
        run: npm run build
